<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное — RADO BAGS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'">
                <h1>RADO BAGS</h1>
            </div>
            <nav class="nav">
                <a href="women.html">ЖЕНСКИЕ СУМКИ</a>
                <a href="men.html">МУЖСКИЕ СУМКИ</a>
                <div class="nav-dropdown mobile-accordion">
                    <a href="accessories.html" class="nav-dropdown__trigger nav-desktop-only">АКСЕССУАРЫ</a>
                    <button class="mobile-acc-toggle mobile-only" type="button">
                        АКСЕССУАРЫ
                        <svg class="mobile-acc-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div class="nav-dropdown__menu mobile-acc-panel">
                        <a href="accessories.html#women">Для неё</a>
                        <a href="accessories.html#men">Для него</a>
                    </div>
                </div>
                <a href="about.html">О НАС</a>
                <a href="contacts.html">КОНТАКТЫ</a>
            </nav>
            <button class="header-hamburger" id="header-hamburger" aria-label="Меню" aria-expanded="false"><span></span><span></span><span></span></button>
                <div class="header-actions header-actions--icons">
                <button type="button" class="header-icon header-search-btn" id="header-search-btn" aria-label="Поиск">
                    <svg class="header-icon-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </button>
                <a href="favorites.html" class="header-icon header-favorites-link" aria-label="Избранное">
                    <svg class="header-icon-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span id="header-favorites-count" class="header-favorites-count">0</span>
                </a>
                <div class="cart-icon" onclick="showCart()">
                    <svg class="header-icon-svg header-cart-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span id="cart-count" class="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="favorites-page">
        <section class="container" style="padding-top: 40px; padding-bottom: 60px;">
            <h1 class="favorites-title">Избранное</h1>
            <div class="products-grid" id="favorites-grid">
                <!-- Товары из избранного подставляются через JS -->
            </div>
            <p class="favorites-empty" id="favorites-empty" style="display: none;">В избранном пока ничего нет. Добавляйте понравившиеся товары сердечком на странице товара.</p>
        </section>
    </main>

    <!-- Поиск -->
    <div class="search-overlay" id="search-overlay" aria-hidden="true">
        <div class="search-overlay__backdrop" id="search-overlay-backdrop"></div>
        <div class="search-overlay__panel">
            <div class="search-overlay__bar">
                <div class="search-overlay__input-wrap">
                    <svg class="search-overlay__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="search" class="search-overlay__input" id="search-overlay-input" placeholder="Поиск товаров..." autocomplete="off">
                </div>
                <button type="button" class="search-overlay__btn-find" id="search-overlay-find">Найти</button>
                <a href="#" class="search-overlay__link-close" id="search-overlay-close">Закрыть</a>
            </div>
            <div class="search-overlay__body">
                <div class="search-overlay__col search-overlay__col--suggestions">
                    <h3 class="search-overlay__col-title">Часто ищут</h3>
                    <ul class="search-overlay__suggestions" id="search-overlay-suggestions"></ul>
                </div>
                <div class="search-overlay__col search-overlay__col--products">
                    <h3 class="search-overlay__col-title" id="search-overlay-col-title">Популярные товары</h3>
                    <div class="search-overlay__results" id="search-overlay-results"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Корзина -->
    <div class="cart-overlay" id="cart-overlay">
        <div class="cart-sidebar">
            <div class="cart-header">
                <h3>Корзина</h3>
                <button class="close-cart" onclick="closeCart()">✕</button>
            </div>
            <div class="cart-items" id="cart-items"></div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span class="total-label">Итого:</span>
                    <span class="total-price" id="cart-total-price">0</span>
                    <span class="total-currency">MDL</span>
                </div>
                <button class="checkout-btn" onclick="openCheckoutModal()">ОФОРМИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="category.js"></script>
    <script>
        (function () {
            function renderFavorites() {
                var ids = typeof getFavorites === 'function' ? getFavorites() : [];
                var grid = document.getElementById('favorites-grid');
                var empty = document.getElementById('favorites-empty');
                if (!grid) return;
                grid.innerHTML = '';
                if (ids.length === 0) {
                    if (empty) empty.style.display = 'block';
                    return;
                }
                if (empty) empty.style.display = 'none';
                ids.forEach(function (id) {
                    var numId = typeof id === 'number' ? id : parseInt(id, 10);
                    if (isNaN(numId)) return;
                    var product = typeof findProductById === 'function' ? findProductById(numId) : null;
                    if (!product) return;
                    var productImage = product.image
                        ? '<img src="' + product.image + '" alt="' + (product.name || '') + '" class="product-img" onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\'">'
                        : '';
                    var priceHtml = (product.price || 0) + ' MDL';
                    var card = '<div class="product-card product-card--minimal" data-product-id="' + product.id + '">' +
                        '<div class="product-image">' + productImage +
                        '<div class="product-emoji" style="display:' + (product.image ? 'none' : 'flex') + '">' + (product.emoji || '👜') + '</div></div>' +
                        '<div class="product-price-minimal-wrap"><span class="product-price-minimal">' + priceHtml + '</span></div>' +
                        '<button type="button" class="add-to-cart" onclick="event.stopPropagation(); addToCartWithNotification(' + product.id + ')">В корзину</button>' +
                        '</div>';
                    grid.insertAdjacentHTML('beforeend', card);
                });
                if (typeof makeProductCardsClickable === 'function') makeProductCardsClickable();
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function () {
                    updateFavoritesCount();
                    renderFavorites();
                });
            } else {
                updateFavoritesCount();
                renderFavorites();
            }
        })();
    </script>


<script>
(function () {
  // Build mobile nav from existing header links
  function buildMobNav() {
    var links = [];
    // index.html uses .header-categories, others use .header .nav
    var src = document.querySelector('.header-categories .container') ||
              document.querySelector('.header .nav');
    if (!src) return;

    var nav = document.createElement('div');
    nav.id = 'mob-nav';

    src.childNodes.forEach(function (node) {
      if (node.nodeType !== 1) return;
      // Simple link
      if (node.tagName === 'A') {
        var a = document.createElement('a');
        a.href = node.href;
        a.textContent = node.textContent.trim();
        nav.appendChild(a);
      }
      // Dropdown wrapper
      if (node.classList && node.classList.contains('nav-dropdown')) {
        var item = document.createElement('div');
        item.className = 'mob-acc-item';

        // Trigger label from the desktop link or accordion button
        var label = '';
        var desktopLink = node.querySelector('.nav-desktop-only') || node.querySelector('.nav-dropdown__trigger');
        var mobileBtn  = node.querySelector('.mobile-acc-toggle');
        if (desktopLink) label = desktopLink.textContent.trim();
        else if (mobileBtn) label = mobileBtn.childNodes[0].textContent.trim();

        var btn = document.createElement('button');
        btn.className = 'mob-acc-btn';
        btn.type = 'button';
        btn.innerHTML = label +
          '<svg width="12" height="12" viewBox="0 0 12 12" fill="none">' +
          '<path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>';

        var panel = document.createElement('div');
        panel.className = 'mob-acc-panel';

        var subLinks = node.querySelectorAll('.nav-dropdown__menu a, .mobile-acc-panel a');
        subLinks.forEach(function (sub) {
          var a = document.createElement('a');
          a.href = sub.href;
          a.textContent = sub.textContent.trim();
          panel.appendChild(a);
        });

        btn.addEventListener('click', function () {
          var open = item.classList.contains('is-open');
          document.querySelectorAll('#mob-nav .mob-acc-item.is-open').forEach(function(i){i.classList.remove('is-open');});
          if (!open) item.classList.add('is-open');
        });

        item.appendChild(btn);
        item.appendChild(panel);
        nav.appendChild(item);
      }
    });

    // Close on any link click
    nav.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', close);
    });

    document.body.appendChild(nav);
    return nav;
  }

  var overlay = document.createElement('div');
  overlay.id = 'mob-overlay';
  document.body.appendChild(overlay);

  var nav = buildMobNav();
  var burger = document.getElementById('header-hamburger');
  if (!burger) return;

  function open() {
    if (nav) nav.classList.add('is-open');
    overlay.style.display = 'block';
    document.body.style.overflow = 'hidden';
    burger.setAttribute('aria-expanded', 'true');
    // Animate burger
    var header = burger.closest('.header');
    if (header) header.classList.add('menu-open');
  }

  function close() {
    if (nav) {
      nav.classList.remove('is-open');
      nav.querySelectorAll('.mob-acc-item.is-open').forEach(function(i){i.classList.remove('is-open');});
    }
    overlay.style.display = 'none';
    document.body.style.overflow = '';
    burger.setAttribute('aria-expanded', 'false');
    var header = burger.closest('.header');
    if (header) header.classList.remove('menu-open');
  }

  burger.addEventListener('click', function (e) {
    e.stopPropagation();
    nav && nav.classList.contains('is-open') ? close() : open();
  });

  overlay.addEventListener('click', close);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') close();
  });

  window.addEventListener('resize', function () {
    if (window.innerWidth > 768) close();
  });
})();
</script>
</body>
</html>
